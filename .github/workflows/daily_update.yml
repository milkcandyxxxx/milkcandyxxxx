name: Waka Readme

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }
          LOCALE: zh                   # 中文
          SHOW_LANGUAGE: True          # 显示语言
          SHOW_EDITORS: True           # 显示编辑器
          SHOW_OS: True                # 显示系统
          SHOW_PROJECTS: True          # 显示项目
          SHOW_DAYS_OF_WEEK: True      # 显示一周分布
          SHOW_COMMIT: True            # 显示早/晚鸟
          SHOW_SHORT_INFO: True         # 显示GitHub资料
          SHOW_TOTAL_CODE_TIME: True    # 显示总编码时长
          SHOW_UPDATED_DATE: True       # 显示更新时间
          SYMBOL_VERSION: 3             # 方块进度条（更好看）
